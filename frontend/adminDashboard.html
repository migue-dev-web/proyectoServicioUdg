<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="page-admin">
    <header class="admin-header">
      <h1>Admin dashboard</h1>
      <div class="user-box">
        <span class="userName" id="userName"></span>
        <button id="logOut">Cerrar sesión</button>
      </div>
    </header>
    <main>
      <section class="card">
        <h2>Insertar formularios a la base de datos</h2>
        <input id="fNombre" placeholder="Nombre" />
        <input id="fLink" placeholder="Link (https://...)" />
        <select id="fDepto" class="depto"></select>
        <button id="fCrear">Insertar formulario</button>
        <h2>Editar formulario</h2>
        <input id="eId" placeholder="ID" />
        <input id="eNombre" placeholder="Nuevo nombre" />
        <input id="eLink" placeholder="Nuevo link" />
        <select id="eDepto" class="depto"></select>
        <button id="eGuardar">Guardar</button>

        <h2>Eliminar formulario</h2>
        <input id="xId" placeholder="ID" />
        <button id="xBorrar">Eliminar</button>
        <h2>Consultar formularios en la base de datos</h2>
        <button id="fConsultar">Consultar existentes</button>
      </section>

      <dialog id="modal">
        <div class="modal-box">
          <button id="modalClose" class="modal-close">&times;</button>
          <h2>Formularios existentes</h2>
          <div id="modalBody"></div>
        </div>
      </dialog>
      <script type="module" src="js/adminDashboard.js"></script>
    </main>
    <footer></footer>
  </body>
</html>
