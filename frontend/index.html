<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Inicio de sesión en la plataforma de formularios de la Universidad de Guadalajara."
    />
    <title>Udg</title>
    <link rel="icon" href="assets/images/udgPlusLogInLogo.jpg" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="page-index">
    <main>
      <div class="login-card">
        <form id="loginForm">
          <h1>Iniciar sesión</h1>
          <img
            src="assets/images/udgPlusLogInLogo.jpg"
            alt="udgPlusLogo"
            class="udg-logo"
            width="177"
            height="64"
          />
          <label for="user" class="sr-only">Correo electrónico</label>
          <input
            type="email"
            name="user"
            id="user"
            placeholder="Correo electrónico"
            required
          />

          <label for="password" class="sr-only">Contraseña</label>
          <input
            type="password"
            name="password"
            id="password"
            placeholder="Contraseña"
            required
          />

          <button type="submit">Iniciar sesión</button>
          <p id="errorMsg"></p>
        </form>
      </div>
      <script type="module" src="js/login.js"></script>
    </main>
  </body>
</html>
