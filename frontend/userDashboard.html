<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mis formularios</title>
    <style>
      /* ─── Globals (compartidos entre páginas) ─────────────────── */

      /* ─── page-index ──────────────────────────────────────────── */

      .page-index {
        background: #f0f1f3;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .page-index .login-card {
        background: white;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 310px;
      }

      .page-index .udg-logo {
        display: block;
        margin: 1rem auto 1rem;
      }

      .page-index .login-card h1 {
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        color: #6b6e75;
        margin: 0 0 1rem;
      }

      .page-index .login-card label {
        display: block;
        font-size: 12px;
        color: #6b6e75;
        margin-bottom: 4px;
      }

      .page-index .login-card input {
        width: 100%;
        box-sizing: border-box;
        border: none;
        border-bottom: 1px solid #c5c8ce;
        background: #eef2fb;
        padding: 10px 12px;
        font-size: 14px;
        color: #333;
        outline: none;
        margin-bottom: 1.5rem;
        transition: border-color 0.3s;
      }

      .page-index .login-card input:focus {
        border-bottom-color: #1e3a8a;
      }

      .page-index .login-card button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(to right, #2ec4e6, #1e5fa5);
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1px;
        cursor: pointer;
        text-transform: uppercase;
        margin-top: 0.5rem;
      }

      /* ─── page-index ──────────────────────────────────────────── */
      .page-admin {
        background: #f0f1f3;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 1.5rem;
        color: #333;
      }
      .page-admin .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }
      .page-admin .admin-header .userName {
        font-weight: bold;
        padding: 1rem;
      }
      .page-admin .card {
        display: grid;
        background: #fff;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        padding: 1.5rem;
        max-width: 16%;
      }
      .page-admin .card h2 {
        font-size: 15px;
        color: #6b6e75;
      }
      .page-admin input,
      .page-admin select {
        width: 100%;
        box-sizing: border-box;
        border: none;
        border-bottom: 1px solid #c5c8ce;
        background: #eef2fb;
        padding: 10px 12px;
        font-size: 14px;
        margin-bottom: 1rem;
        outline: none;
      }
      .page-admin button {
        padding: 12px 18px;
        margin-right: 8px;
        background: linear-gradient(to right, #2ec4e6, #1e5fa5);
        color: #fff;
        border: none;
        border-radius: 30px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .page-admin dialog {
        border: none;
        border-radius: 8px;
        padding: 0;
        width: 90%;
        max-width: 520px;
      }
      .page-admin dialog::backdrop {
        background: rgba(0, 0, 0, 0.5);
      }
      .page-admin .modal-box {
        padding: 1.5rem;
        max-height: 80vh;
        overflow-y: auto;
        position: relative;
      }
      .page-admin .modal-close {
        position: absolute;
        top: 8px;
        right: 12px;
        background: none;
        border: none;
        border-radius: 0;
        color: #888;
        font-size: 22px;
        padding: 0;
        cursor: pointer;
      }
      .page-admin .modal-item {
        border-bottom: 1px solid #eee;
        padding: 10px 0;
        font-size: 13px;
        line-height: 1.5;
      }
      .page-admin .modal-item a {
        color: #1e5fa5;
        word-break: break-all;
      }

      /* ─── page-user ──────────────────────────────────────────── */
      .page-user {
        background: #f0f1f3;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 1.5rem;
        color: #333;
      }
      .page-user .dash-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }
      .page-user .dash-header .userName {
        font-weight: bold;
        padding: 1rem;
      }
      .page-user button {
        padding: 12px 18px;
        background: linear-gradient(to right, #2ec4e6, #1e5fa5);
        color: #fff;
        border: none;
        border-radius: 30px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .page-user .forms-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1rem;
      }
      .page-user .form-card {
        display: block;
        background: #fff;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        padding: 1.25rem;
        text-decoration: none;
        color: #1e5fa5;
        font-weight: 600;
      }
      .page-user .form-card:hover {
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
      }
      .page-user .form-card .dept {
        display: block;
        margin-top: 6px;
        font-size: 12px;
        font-weight: 400;
        color: #6b6e75;
      }
      .page-user .empty {
        background: #fff;
        border-radius: 6px;
        padding: 1.5rem;
        color: #6b6e75;
      }
    </style>
  </head>
  <body class="page-user">
    <header class="dash-header">
      <h1>Mis formularios</h1>
      <div class="user-box">
        <span class="userName" id="userName"></span>
        <button id="logout">Cerrar sesión</button>
      </div>
    </header>
    <main>
      <div id="forms" class="forms-grid"></div>
    </main>
    <script type="module" src="js/userDashboard.js"></script>
    <script type="module" src="js/userDashboard.js"></script>
  </body>
</html>
